<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Persetujuan Pengeluaran Kas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b2a41">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --ink:#1b2a41; --ink-soft:#4a5568; --line:#d8d3c8;
    --paper:#f7f5f0; --card:#ffffff;
    --ya:#2f6b4f; --tidak:#96331f; --tunda:#8a6410;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font:400 17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  header{
    background:var(--ink); color:#fff; padding:18px 20px;
  }
  header h1{
    margin:0; font:500 19px/1.3 Georgia,"Times New Roman",serif; letter-spacing:.2px;
  }
  header p{margin:4px 0 0; font-size:13px; opacity:.75}
  main{max-width:640px; margin:0 auto; padding:20px 16px 60px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; margin-bottom:18px; overflow-wrap:anywhere;
  }
  h2{font:500 20px/1.3 Georgia,serif; margin:0 0 4px}
  .sub{color:var(--ink-soft); font-size:14px; margin:0 0 20px}
  label{display:block; font-weight:500; font-size:15px; margin:16px 0 6px}
  input,select,textarea{
    width:100%; padding:12px 13px; font-size:17px; font-family:inherit;
    border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--ink); outline-offset:1px}
  textarea{min-height:88px; resize:vertical}
  .hint{font-size:13px; color:var(--ink-soft); margin-top:5px}
  button{
    font:500 17px inherit; padding:14px 20px; border-radius:8px; border:1px solid transparent;
    cursor:pointer; width:100%; margin-top:10px;
  }
  .b-utama{background:var(--ink); color:#fff}
  .b-ya{background:var(--ya); color:#fff}
  .b-tidak{background:#fff; color:var(--tidak); border-color:var(--tidak)}
  button:disabled{opacity:.5; cursor:not-allowed}
  dl{margin:0 0 18px; display:grid; grid-template-columns:auto 1fr; gap:9px 16px; font-size:15px}
  dt{color:var(--ink-soft)}
  dd{margin:0; font-weight:500; overflow-wrap:anywhere}
  .nominal{font-size:26px; font-family:Georgia,serif}
  .pill{
    display:inline-block; padding:5px 11px; border-radius:99px; font-size:13px;
    background:#eceae4; color:var(--ink-soft);
  }
  .pesan{padding:14px 16px; border-radius:8px; margin:16px 0; font-size:15px}
  .pesan.ok{background:#e8f1eb; color:var(--ya)}
  .pesan.galat{background:#f6e9e5; color:var(--tidak)}
  .pesan.info{background:#f5eedd; color:var(--tunda)}
  .radio-baris{display:flex; gap:10px; margin-top:8px}
  .radio-baris label{
    flex:1; margin:0; padding:13px; text-align:center; border:1px solid var(--line);
    border-radius:8px; cursor:pointer; font-weight:400;
  }
  .radio-baris input{position:absolute; opacity:0; width:0}
  .radio-baris input:checked + span{font-weight:500}
  .radio-baris label:has(input:checked){border-color:var(--ink); background:#f0eee9}
  #splash{
    position:fixed; inset:0; z-index:99; background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; transition:opacity .45s ease;
  }
  #splash.pergi{opacity:0; pointer-events:none}
  #splash img{
    width:min(46vw,180px); height:auto;
    animation:muncul .7s cubic-bezier(.2,.7,.3,1) both;
  }
  #splash .nama{
    font:500 20px/1.35 Georgia,"Times New Roman",serif; color:var(--ink);
    text-align:center; letter-spacing:.3px; padding:0 24px;
    animation:muncul .7s .16s cubic-bezier(.2,.7,.3,1) both;
  }
  #splash .sub-nama{
    font-size:13px; color:var(--ink-soft); letter-spacing:.9px; text-transform:uppercase;
    animation:muncul .7s .28s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes muncul{from{opacity:0; transform:translateY(9px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){
    #splash img, #splash .nama, #splash .sub-nama{animation:none}
    #splash{transition:none}
  }

  .kecil{font-size:14px; color:var(--ink-soft); text-align:center; margin-top:24px}
  .sembunyi{display:none}
  .tautan{display:block; text-align:center; margin-top:18px; color:var(--ink); font-size:15px}

  .ajuan{border-top:1px solid var(--line); padding-top:18px; margin-top:18px}
  .ajuan:first-of-type{border-top:0; padding-top:0; margin-top:0}
  .ajuan-kepala{display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap}
  .ajuan-judul{font-weight:500}
  .ajuan-meta{font-size:13px; color:var(--ink-soft)}

  .jalur{list-style:none; padding:0; margin:16px 0 0}
  .jalur li{display:flex; gap:13px; padding-bottom:16px; position:relative}
  .jalur li:not(:last-child)::before{
    content:''; position:absolute; left:8px; top:20px; bottom:0; width:1px; background:var(--line);
  }
  .titik{
    flex:none; width:17px; height:17px; border-radius:50%; margin-top:3px;
    border:2px solid var(--line); background:#fff; z-index:1;
  }
  .t-selesai .titik{background:var(--ya); border-color:var(--ya)}
  .t-aktif .titik{border-color:var(--ink); box-shadow:0 0 0 3px #dfe3ea}
  .t-gagal .titik{background:var(--tidak); border-color:var(--tidak)}
  .jalur-isi{flex:1; min-width:0}
  .jalur-nama{font-size:15px}
  .t-aktif .jalur-nama{font-weight:500}
  .t-menunggu .jalur-nama{color:#9a9589}
  .jalur-detail{font-size:13px; color:var(--ink-soft); margin-top:2px; word-wrap:break-word}
  .t-gagal .jalur-detail{color:var(--tidak)}

  .lampiran{border:1px dashed var(--line); border-radius:8px; padding:14px; margin-top:6px}
  .lampiran-baris{display:flex; gap:10px}
  .lampiran-tombol{
    flex:1; display:block; padding:13px 8px; text-align:center; cursor:pointer;
    border:1px solid var(--ink); border-radius:8px; font-weight:500; font-size:15px; background:#fff;
  }
  .lampiran-tombol:hover{background:#f0eee9}
  .lampiran-tombol input{position:absolute; opacity:0; width:0; height:0}
  .lampiran-atau{text-align:center; font-size:13px; color:var(--ink-soft); margin:12px 0}
  .foto-daftar{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
  .foto{position:relative; width:84px; height:84px; border-radius:8px; overflow:hidden; border:1px solid var(--line)}
  .foto img{width:100%; height:100%; object-fit:cover; display:block}
  .foto button{
    position:absolute; top:3px; right:3px; width:24px; height:24px; margin:0; padding:0;
    border-radius:50%; background:rgba(0,0,0,.62); color:#fff; font-size:15px; line-height:1;
    border:0; cursor:pointer;
  }
  .foto-galat{border-color:var(--tidak)}
  .foto-galat img{opacity:.35}
</style>
</head>

<header>
  <h1>Persetujuan Pengeluaran Kas</h1>
  <p id="header-sub">BJ GBI Danau Lau Kawar</p>
</header>

<main id="app">
  <div class="card"><p class="sub" style="margin:0">Memuat…</p></div>
</main>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyWuOg76qaB_JUdhWyFiZ52Jdy4A3i93-zxQoB5gcWRsfudIhMBuCh_94xygWNmnntQ/exec';

const app = document.getElementById('app');
const params = new URLSearchParams(location.search);
const token = params.get('t');

const rp = n => 'Rp' + Number(n||0).toLocaleString('id-ID');
const esc = s => String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function apiGet(qs){
  const r = await fetch(API + '?' + qs);
  return r.json();
}
async function apiPost(payload){
  const r = await fetch(API, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return r.json();
}

function pesan(teks, jenis='info'){
  return `<div class="pesan ${jenis}">${esc(teks)}</div>`;
}

function ringkasan(p){
  return `<dl>

/** Susun kalimat kuorum dari aturan yang berlaku, bukan dari angka tetap. */
function kalimatKuorum(nominal, a){
  if(!a) return 'Kuorum penasehat mengikuti aturan yang berlaku.';
  const orang = n => `${n} dari ${a.totalPenasehat} penasehat`;
  if(nominal === null || nominal === 0)
    return `Di atas ${rp(a.threshold)} memerlukan persetujuan ${orang(a.butuhDiAtas)}.`;
  return nominal > a.threshold
    ? `Nominal ini memerlukan persetujuan ${orang(a.butuhDiAtas)}.`
    : `Nominal ini cukup disetujui ${orang(a.butuhDiBawah)}.`;
}

async function halamanTiket(){

  if(!res.ok){
    app.innerHTML = `<div class="card"><h2>Link tidak berlaku</h2>${pesan(res.error,'galat')}</div>`;

    app.innerHTML = `<div class="card">
      <h2>${selesai ? 'Sudah selesai diproses' : 'Tahap ini sudah diproses'}</h2>

      ${selesai ? '' : pesan('Tidak ada tindakan yang perlu Anda lakukan dari tautan ini.','info')}
    </div>`;
    return;
  }

  const render = {
    wakil: () => formPutusan(p, 'Persetujuan Wakil Koordinator'),
    koordinator: () => formPutusan(p, 'Persetujuan Koordinator'),
    dana: () => formDana(p, res.aturan),

  }[res.tahap];

    return;
  }
  render();
}

// ---------- Komponen lampiran foto ----------
const MAKS_FOTO = 3;

/** Kecilkan foto di ponsel sebelum dikirim, supaya unggahan tidak gagal. */
async function kecilkanFoto(file, maks = 1600, mutu = 0.75){
  let sumber;
  try {
    sumber = await createImageBitmap(file);
  } catch {
    sumber = await new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = () => rej(new Error('Format gambar tidak didukung.'));
      img.src = URL.createObjectURL(file);
    });
  }
  const w = sumber.width, h = sumber.height;
  const skala = Math.min(1, maks / Math.max(w, h));
  const c = document.createElement('canvas');
  c.width = Math.round(w * skala);
  c.height = Math.round(h * skala);
  c.getContext('2d').drawImage(sumber, 0, 0, c.width, c.height);

  const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', mutu));
  if(!blob) throw new Error('Gagal memproses gambar.');
  const b64 = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(String(fr.result).split(',')[1]);
    fr.onerror = () => rej(new Error('Gagal membaca berkas.'));
    fr.readAsDataURL(blob);
  });
  return { b64, pratinjau: c.toDataURL('image/jpeg', 0.5), ukuran: blob.size };
}

/**
 * Pasang pemilih foto ke dalam elemen `#${id}`.
 * Mengembalikan objek dengan .tautan() -> array URL, dan .siap() -> boolean.
 */
function pasangLampiran(id, konteks, labelTautan){
  const wadah = document.getElementById(id);
  wadah.innerHTML = `
    <div class="lampiran">
      <div class="lampiran-baris">
        <label class="lampiran-tombol">
          📷 Ambil Foto
          <input type="file" accept="image/*" capture="environment" id="${id}-kamera">
        </label>
        <label class="lampiran-tombol">
          🖼️ Pilih dari Galeri
          <input type="file" accept="image/*" multiple id="${id}-galeri">
        </label>
      </div>
      <div class="foto-daftar" id="${id}-daftar"></div>
      <div class="lampiran-atau">atau</div>
      <input type="url" id="${id}-tautan" placeholder="${esc(labelTautan)}">
    </div>`;

  const foto = [];
  const daftar = document.getElementById(`${id}-daftar`);
  const inputKamera = document.getElementById(`${id}-kamera`);
  const inputGaleri = document.getElementById(`${id}-galeri`);

  function gambarUlang(){
    daftar.innerHTML = foto.map((f, i) => `
      <div class="foto ${f.galat ? 'foto-galat' : ''}">
        <img src="${f.pratinjau}" alt="Lampiran ${i+1}">
        <button type="button" aria-label="Hapus foto ${i+1}" data-i="${i}">×</button>
      </div>`).join('');
    daftar.querySelectorAll('button').forEach(b => {
      b.onclick = () => { foto.splice(Number(b.dataset.i), 1); gambarUlang(); };
    });
    const penuh = foto.length >= MAKS_FOTO;
    inputKamera.closest('.lampiran-tombol').style.display = penuh ? 'none' : '';
    inputGaleri.closest('.lampiran-tombol').style.display = penuh ? 'none' : '';
  }

  async function tambahBerkas(input){
    const berkas = Array.from(input.files || []);
    input.value = '';
    for(const b of berkas){
      if(foto.length >= MAKS_FOTO){
        alert(`Maksimal ${MAKS_FOTO} foto.`);
        break;
      }
      try {
        const hasil = await kecilkanFoto(b);
        foto.push({ ...hasil, galat: false });
      } catch(e) {
        alert('Foto tidak bisa diproses: ' + e.message);
      }
      gambarUlang();
    }
  }
  inputKamera.onchange = () => tambahBerkas(inputKamera);
  inputGaleri.onchange = () => tambahBerkas(inputGaleri);

  return {
    jumlahFoto: () => foto.length,
    tautanManual: () => document.getElementById(`${id}-tautan`).value.trim(),
    siap(){ return foto.length > 0 || this.tautanManual() !== ''; },
    async unggah(lapor){
      const url = [];
      for(let i = 0; i < foto.length; i++){
        lapor?.(`Mengunggah foto ${i+1} dari ${foto.length}…`);
        const r = await apiPost({ action:'unggah', konteks, mime:'image/jpeg', data: foto[i].b64 });
        if(!r.ok) throw new Error(r.error || 'Unggahan gagal.');
        url.push(r.url);
      }
      const manual = this.tautanManual();
      if(manual) url.push(manual);
      return url;
    }
  };
}

/** Tampilkan satu atau beberapa tautan lampiran. */
function tampilLampiran(gabungan, label){
  const url = String(gabungan || '').split(',').map(s => s.trim()).filter(Boolean);
  if(!url.length) return pesan(`Tidak ada ${label} yang dilampirkan.`, 'info');
  return `<p>${url.map((u, i) =>
    `<a href="${esc(u)}" target="_blank" rel="noopener">Lihat ${esc(label)}${url.length > 1 ? ' ' + (i+1) : ''}</a>`
  ).join(' · ')}</p>`;
}

    <a class="tautan" href="${location.pathname}">Kembali ke formulir pengajuan</a>
  </div>
  <div id="hasil"></div>`;

  const simpan = sessionStorage.getItem(KUNCI_KODE);
  if(simpan) document.getElementById('kode').value = simpan;

  document.getElementById('lihat').onclick = async (ev) => {
    const email = document.getElementById('siapa').value;
    const kode = document.getElementById('kode').value.trim();
    if(!email || !kode){
      document.getElementById('notif').innerHTML = pesan('Pilih nama dan isi kode akses.','galat');
      return;
    }
    ev.target.disabled = true; ev.target.textContent = 'Memuat…';
    const r = await apiGet(`action=status&email=${encodeURIComponent(email)}&kode=${encodeURIComponent(kode)}`);
    ev.target.disabled = false; ev.target.textContent = 'Lihat status';

    if(!r.ok){
      document.getElementById('notif').innerHTML = pesan(r.error,'galat');
      document.getElementById('hasil').innerHTML = '';
      return;
    }
    sessionStorage.setItem(KUNCI_KODE, kode);
    document.getElementById('notif').innerHTML = '';
    document.getElementById('hasil').innerHTML = r.data.length
      ? `<div class="card">${r.data.map(kartuAjuan).join('')}</div>`
      : `<div class="card"><p class="sub" style="margin:0">Belum ada pengajuan atas nama ini.</p></div>`;
  };
}

function kartuAjuan(a){
  const langkah = a.tahapan.map(t => `
    <li class="t-${t.keadaan}">
      <span class="titik"></span>
      <div class="jalur-isi">
        <div class="jalur-nama">${esc(t.nama)}${t.tanggal ? ` · <span class="ajuan-meta">${esc(t.tanggal)}</span>` : ''}</div>
        ${t.detail ? `<div class="jalur-detail">${esc(t.detail)}</div>` : ''}
      </div>
    </li>`).join('');

  return `<div class="ajuan">
    <div class="ajuan-kepala">
      <span class="ajuan-judul">${esc(a.uraian)}</span>
      <span class="ajuan-meta">${esc(a.id)} · ${esc(a.tanggal)}</span>
    </div>
    <p style="margin:6px 0 0"><span class="pill">${esc(a.status)}</span> <strong>${rp(a.nominal)}</strong></p>
    <ul class="jalur">${langkah}</ul>
  </div>`;
}

// ---------- Mulai ----------
const MULAI = Date.now();
const TAMPIL_SPLASH_MIN = 900; // ms, supaya logo tidak berkedip sekilas

function tutupSplash(){
  const sisa = Math.max(0, TAMPIL_SPLASH_MIN - (Date.now() - MULAI));
  setTimeout(() => {
    const el = document.getElementById('splash');
    if(!el) return;
    el.classList.add('pergi');
    el.addEventListener('transitionend', () => el.remove(), { once: true });
    setTimeout(() => el.remove(), 700); // jaring pengaman bila transisi tidak berjalan
  }, sisa);
}

const rute = params.has('status') ? halamanStatus : (token ? halamanTiket : halamanPengajuan);
rute()
  .catch(() => {
    app.innerHTML = `<div class="card"><h2>Tidak dapat terhubung</h2>
      ${pesan('Periksa koneksi internet, lalu muat ulang halaman.','galat')}</div>`;
  })
  .finally(tutupSplash);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
